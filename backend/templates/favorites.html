<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Liked Songs</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #121212;
            color: #fff;
        }
        /* ================= HEADER ================= */
        
        .header {
            background: linear-gradient(to bottom, #1db954 0%, #121212 80%);
            padding: 60px 40px;
        }
        
        .header h1 {
            font-size: 3rem;
            font-weight: 700;
        }
        
        .header p {
            color: #e0e0e0;
            margin-top: 10px;
        }
        /* ================= PLAY ALL ================= */
        
        .top-bar {
            padding: 20px 40px;
        }
        
        .play-all-btn {
            background: #1db954;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 25px;
            cursor: pointer;
            color: white;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        
        .play-all-btn:hover {
            transform: scale(1.1);
            background: #1ed760;
        }
        /* ================= SONG GRID ================= */
        
        .songs-container {
            padding: 20px 40px 140px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }
        
        .song-card {
            background: #181818;
            padding: 20px;
            border-radius: 12px;
            transition: 0.3s;
            position: relative;
        }
        
        .song-card:hover {
            background: #242424;
            transform: translateY(-5px);
        }
        
        .song-image {
            width: 100%;
            border-radius: 10px;
        }
        
        .song-info {
            margin-top: 15px;
        }
        
        .song-info h3 {
            font-size: 1rem;
        }
        
        .song-info p {
            font-size: 0.85rem;
            color: #b3b3b3;
            margin-top: 5px;
        }
        /* Hover Play Button */
        
        .card-play {
            position: absolute;
            right: 25px;
            bottom: 90px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #1db954;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.3s;
            cursor: pointer;
        }
        
        .song-card:hover .card-play {
            opacity: 1;
            transform: translateY(0);
        }
        /* Remove Button */
        
        .removeBtn {
            background: none;
            border: none;
            color: #1db954;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        /* ================= PLAYER BAR ================= */
        
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(24, 24, 24, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #282828;
        }
        
        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .player-info img {
            width: 55px;
            height: 55px;
            border-radius: 6px;
        }
        
        .player-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .control-btn:hover {
            color: #1db954;
            transform: scale(1.2);
        }
        
        .active {
            color: #1db954;
        }
        /* Seekbar */
        
        .seek-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        input[type="range"] {
            accent-color: #1db954;
        }
        
        .seekbar {
            width: 300px;
        }
        
        .volume {
            width: 100px;
        }
        
        audio {
            display: none;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Liked Songs</h1>
        <p>Your personal collection</p>
    </div>

    <div class="top-bar">
        <button class="play-all-btn" id="playAllBtn">▶</button>
    </div>

    <div class="songs-container">
        {% for song in songs %}
        <div class="song-card" data-url="{{ song.url }}" data-title="{{ song.title }}" data-artist="{{ song.artist }}" data-image="{{ song.image }}">

            <img class="song-image" src="{{ song.image }}">
            <div class="card-play">▶</div>

            <div class="song-info">
                <h3>{{ song.title }}</h3>
                <p>{{ song.artist }}</p>
            </div>

            <button class="removeBtn">💚</button>
        </div>
        {% endfor %}
    </div>

    <!-- Player -->
    <div class="player-bar" id="playerBar" style="display:none;">
        <div class="player-info">
            <img id="playerImg">
            <div>
                <strong id="playerTitle"></strong>
                <small id="playerArtist"></small>
            </div>
        </div>

        <div class="player-controls">
            <button class="control-btn" id="shuffleBtn">🔀</button>
            <button class="control-btn" id="prevBtn">⏮</button>
            <button class="control-btn" id="playPauseBtn">▶</button>
            <button class="control-btn" id="nextBtn">⏭</button>
            <button class="control-btn" id="repeatBtn">🔁</button>
        </div>

        <div class="seek-container">
            <span id="currentTime">0:00</span>
            <input type="range" id="seekBar" class="seekbar" value="0" min="0">
            <span id="totalTime">0:00</span>
            <input type="range" id="volumeBar" class="volume" min="0" max="1" step="0.01" value="1">
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        let queue = [];
        let currentIndex = -1;
        let isShuffle = false;
        let isRepeat = false;

        const audio = document.getElementById("audioPlayer");
        const playerBar = document.getElementById("playerBar");
        const playPauseBtn = document.getElementById("playPauseBtn");

        function buildQueue() {
            queue = [];
            document.querySelectorAll(".song-card").forEach(card => {
                queue.push({
                    url: card.dataset.url,
                    title: card.dataset.title,
                    artist: card.dataset.artist,
                    image: card.dataset.image
                });
            });
        }

        function loadSong(index) {
            const song = queue[index];
            if (!song) return;

            currentIndex = index;
            audio.src = song.url;

            document.getElementById("playerImg").src = song.image;
            document.getElementById("playerTitle").textContent = song.title;
            document.getElementById("playerArtist").textContent = song.artist;

            playerBar.style.display = "flex";
            audio.play();
            playPauseBtn.textContent = "⏸";
        }

        document.querySelectorAll(".card-play").forEach((btn, i) => {
            btn.addEventListener("click", () => {
                buildQueue();
                loadSong(i);
            });
        });

        document.getElementById("playAllBtn").onclick = () => {
            buildQueue();
            loadSong(0);
        };

        playPauseBtn.onclick = () => {
            if (audio.paused) {
                audio.play();
                playPauseBtn.textContent = "⏸";
            } else {
                audio.pause();
                playPauseBtn.textContent = "▶";
            }
        };

        document.getElementById("nextBtn").onclick = () => {
            if (isShuffle) {
                loadSong(Math.floor(Math.random() * queue.length));
            } else if (currentIndex < queue.length - 1) {
                loadSong(currentIndex + 1);
            }
        };

        document.getElementById("prevBtn").onclick = () => {
            if (currentIndex > 0) {
                loadSong(currentIndex - 1);
            }
        };

        document.getElementById("shuffleBtn").onclick = function() {
            isShuffle = !isShuffle;
            this.classList.toggle("active");
        };

        document.getElementById("repeatBtn").onclick = function() {
            isRepeat = !isRepeat;
            this.classList.toggle("active");
        };

        audio.addEventListener("timeupdate", () => {
            const seekBar = document.getElementById("seekBar");
            seekBar.max = audio.duration || 0;
            seekBar.value = audio.currentTime;
            document.getElementById("currentTime").textContent = formatTime(audio.currentTime);
            document.getElementById("totalTime").textContent = formatTime(audio.duration);
        });

        document.getElementById("seekBar").oninput = (e) => {
            audio.currentTime = e.target.value;
        };

        document.getElementById("volumeBar").oninput = (e) => {
            audio.volume = e.target.value;
        };

        audio.onended = () => {
            if (isRepeat) {
                loadSong(currentIndex);
            } else {
                document.getElementById("nextBtn").click();
            }
        };

        function formatTime(sec) {
            if (isNaN(sec)) return "0:00";
            let m = Math.floor(sec / 60);
            let s = Math.floor(sec % 60).toString().padStart(2, "0");
            return `${m}:${s}`;
        }
    </script>

</body>

</html>
