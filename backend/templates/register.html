<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign up - Voiceify</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Circular+Std:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background: linear-gradient(180deg, #121212 0%, #000000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        .container {
            background: #181818;
            padding: 50px 40px;
            width: 380px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }
        
        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #1DB954;
            margin-bottom: 30px;
        }
        
        h2 {
            margin-bottom: 25px;
            font-size: 22px;
            font-weight: 600;
        }
        
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #121212;
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        
        input:focus {
            border: 1px solid #1DB954;
        }
        
        input[type="submit"] {
            background: #1DB954;
            border: none;
            color: black;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        
        input[type="submit"]:hover {
            background: #1ed760;
            transform: scale(1.03);
        }
        
        .login-link {
            margin-top: 20px;
            font-size: 14px;
            color: #b3b3b3;
        }
        
        .login-link a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link a:hover {
            color: #1DB954;
        }
        
        @media(max-width: 450px) {
            .container {
                width: 90%;
                padding: 40px 25px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="logo">Voiceify</div>
        <h2>Sign up to start listening</h2>

        <!-- Backend Logic SAME -->
        <form action="/register" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email address" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="submit" value="Sign Up">
        </form>

        <div class="login-link">
            Already have an account? <a href="/login">Log in</a>
        </div>
    </div>

</body>

</html>
